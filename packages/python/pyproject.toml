[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "toolbox-gateway"
version = "0.6.1"
description = "Single-tool gateway pattern for LLM agents — discover, inspect, and execute tools on demand"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Jason McNeal" },
]
keywords = ["llm", "ai", "agent", "tools", "mcp", "token-optimization"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = []

[project.optional-dependencies]
redis = ["redis>=5.0"]
langchain = ["langchain-core>=0.1", "pydantic>=2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]

[tool.hatch.build.targets.wheel]
packages = ["src/toolbox_gateway"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"